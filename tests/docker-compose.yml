services:
  dnsapi:
    build:
      context: ../
      dockerfile: api/Dockerfile
    networks:
      - dnsnetwork
    container_name: dnsapi
    depends_on:
      - cache
      - mongodb
    ports:
      - 3000:3000
    volumes:
      - ./bootstrap/services:/opt/services:ro
      - ./bootstrap/geolite/:/opt/geo:ro
    env_file:
      - ./config/api.env
    healthcheck:
      test: ["CMD", "/bin/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s

  dnsproxy:
    build:
      context: ../
      dockerfile: proxy/Dockerfile
    networks:
      - dnsnetwork
    container_name: dnsproxy
    depends_on:
      - cache
      - redis-replica-dns
      - mongodb
      - sdns
    # - unbound
    ports:
      - "53000:53/udp" # PLAIN DNS
      - "53000:53/tcp" # PLAIN DNS
      - "443:443" # HTTPS
      - "853:853/tcp" # TLS
      - "853:853/udp" # QUIC
    volumes:
      - ../certs:/certs
      - ./bootstrap/services:/opt/services:ro
      - ./bootstrap/geolite/:/opt/geo:ro
    env_file:
      - ./config/proxy.env

  dnscheck:
    build:
      context: ../
      dockerfile: dnscheck/Dockerfile
    networks:
      - dnsnetwork
    container_name: dnscheck
    depends_on:
      - cache
      - sdns
    ports:
      - "80:3000"
      - "30000:53/udp"
      - "30000:53/tcp"
    volumes:
      - ../dnscheck:/app
      - ./bootstrap/geolite/:/opt/dnscheck/GeoIP
      - ./bootstrap/geolite/:/opt/dnscheck/GeoIPCity
    env_file:
      - ./config/dnscheck.env

  dnsblocklists:
    build:
      context: ../
      dockerfile: blocklists/Dockerfile
    networks:
      - dnsnetwork
    container_name: dnsblocklists
    depends_on:
      - cache
      - mongodb
      - sdns
    volumes:
      - ./blocklists_sources/:/sources
    env_file:
      - ./config/blocklists.env

  sdns:
    image: c1982/sdns:1.6.0
    command: ["-c", "/sdns.conf"]
    # restart: always # most probably unbound CI failures are caused by this line
    networks:
      dnsnetwork:
        ipv4_address: 10.5.0.5
    container_name: sdns
    volumes:
      - ./config/sdns.conf:/sdns.conf
      - ./config/testhosts.txt:/testhosts.txt:ro

  # unbound:
  #   image: mvance/unbound:1.21.1
  #   # restart: always
  #   command: /opt/unbound/sbin/unbound -vv -d -d -c /opt/unbound/etc/unbound/unbound.conf
  #   networks:
  #     dnsnetwork:
  #       ipv4_address: 10.5.0.6
  #   container_name: unbound
  #   volumes:
  #     - ../bootstrap/recursor:/opt/unbound/etc/unbound/

  mongodb:
    image: mongo:8.2.3
    networks:
      - dnsnetwork
    container_name: mongodb
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_DATABASE=dns
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 3

  cache:
    container_name: cache
    image: ${REDIS_IMAGE}
    restart: always
    command: ["redis-server", "/etc/redis/master.conf"]
    networks:
      dnsnetwork:
        ipv4_address: 10.5.0.10
    ports:
      - '6379:6379'
      - '8001:8001'
    volumes:
      - ./bootstrap/redis/master.conf:/etc/redis/master.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli","--user","appcache","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-replica:
    container_name: redis-replica
    image: ${REDIS_IMAGE}
    command: ["redis-server", "/etc/redis/replica.conf"]
    restart: always
    depends_on:
      - cache
    networks:
      dnsnetwork:
        ipv4_address: 10.5.0.11
    volumes:
      - ./bootstrap/redis/replica.conf:/etc/redis/replica.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli","--user","appcache","-p","6379","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-replica-dns:
    container_name: redis-replica-dns
    image: ${REDIS_IMAGE}
    command: ["redis-server", "/etc/redis/replica-dns.conf"]
    restart: always
    depends_on:
      - cache
    networks:
      dnsnetwork:
        ipv4_address: 10.5.0.20
    volumes:
      - ./bootstrap/redis/replica-dns.conf:/etc/redis/replica-dns.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli","--user","appcache","-p","6379","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  sentinel1:
    container_name: sentinel1
    image: ${REDIS_IMAGE}
    restart: always
    depends_on:
      - cache
      - redis-replica
    networks:
      - dnsnetwork
    ports:
      - '26379:26379'
    volumes:
      - ./bootstrap/redis/sentinel.conf:/tmp/sentinel.conf:ro
    command: ["/bin/sh","-c","cp /tmp/sentinel.conf /data/sentinel.conf && exec redis-server /data/sentinel.conf --sentinel"]
    healthcheck:
      test: ["CMD", "redis-cli","-p","26379","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sentinel2:
    container_name: sentinel2
    image: ${REDIS_IMAGE}
    restart: always
    depends_on:
      - cache
      - redis-replica
    networks:
      - dnsnetwork
    ports:
      - '26380:26379'
    volumes:
      - ./bootstrap/redis/sentinel.conf:/tmp/sentinel.conf:ro
    command: ["/bin/sh","-c","cp /tmp/sentinel.conf /data/sentinel.conf && exec redis-server /data/sentinel.conf --sentinel"]
    healthcheck:
      test: ["CMD", "redis-cli","-p","26379","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sentinel3:
    container_name: sentinel3
    image: ${REDIS_IMAGE}
    restart: always
    depends_on:
      - cache
      - redis-replica
    networks:
      - dnsnetwork
    ports:
      - '26381:26379'
    volumes:
      - ./bootstrap/redis/sentinel.conf:/tmp/sentinel.conf:ro
    command: ["/bin/sh","-c","cp /tmp/sentinel.conf /data/sentinel.conf && exec redis-server /data/sentinel.conf --sentinel"]
    healthcheck:
      test: ["CMD", "redis-cli","-p","26379","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  email:
    container_name: email
    image: axllent/mailpit:v1.24.2
    restart: always
    networks:
      - dnsnetwork
    ports:
      - '8025:8025'
      - '1025:1025'

networks:
  dnsnetwork:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
          gateway: 10.5.0.1