# Redis replica configuration for proxy read-replica integration tests
port 6379
protected-mode no
replicaof 10.5.0.10 6379
# Multi-user replication (use failovercache ACL user for replication auth)
masteruser failovercache
masterauth failoverCacheTestPass456
user appcache on >appCacheTestPass123 ~* +@all
user failovercache on >failoverCacheTestPass456 ~* +@all
save ""
appendonly no
