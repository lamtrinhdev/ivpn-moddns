# Minimal Redis Sentinel configuration for integration tests
# Monitors the master instance named 'mymaster' (service 'cache') on port 6379
port 26379

# ACL users so clients (API/Proxy/etc.) can AUTH with username+password against Sentinel itself.
# Sentinel does not need these to function internally, but go-redis Failover client will attempt AUTH if creds provided.
user appcache on >appCacheTestPass123 ~* +@all
user failovercache on >failoverCacheTestPass456 ~* +@all

sentinel monitor mymaster 10.5.0.10 6379 2
# Use ACL user for authenticating to master / replicas
sentinel auth-user mymaster failovercache
# Sentinel authenticates using dedicated failovercache user credentials
sentinel auth-pass mymaster failoverCacheTestPass456
# milliseconds the master should be unreachable to consider it down
sentinel down-after-milliseconds mymaster 5000
# milliseconds to wait before starting a failover
sentinel failover-timeout mymaster 60000
# number of replicas that can be reconfigured to use new master simultaneously
sentinel parallel-syncs mymaster 1
# Disable protected mode so sentinel can be accessed within docker network
protected-mode no
