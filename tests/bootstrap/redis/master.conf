# Redis master configuration for integration tests with Sentinel
port 6379
protected-mode no
# Multi-user ACL configuration (no global requirepass; default user stays disabled)
# Users:
#  - appcache: direct client connections
#  - failovercache: used by replica & sentinel failover clients
user appcache on >appCacheTestPass123 ~* +@all
user failovercache on >failoverCacheTestPass456 ~* +@all
save ""
appendonly no
