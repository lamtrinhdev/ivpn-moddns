<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/src/assets/logos/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/src/assets/logos/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/src/assets/logos/apple-touch-icon.png" />
    <link rel="manifest" href="/src/assets/logos/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Early theme bootstrap to prevent initial white flash. This sets data-shadcn-ui-mode + body bg before first paint. -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('vite-ui-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored ? stored : (prefersDark ? 'dark' : 'light');
          var modeAttr = theme === 'dark' ? 'dark-emerald' : 'light';
          document.documentElement.setAttribute('data-shadcn-ui-mode', modeAttr);
          // Fallback colors (match Tailwind / design tokens) - adjust if design system updates
          document.body.style.backgroundColor = theme === 'dark' ? '#111111' : '#ffffff';
        } catch (e) {
          document.documentElement.setAttribute('data-shadcn-ui-mode', 'dark-emerald');
          document.body.style.backgroundColor = '#111111';
        }
      })();
    </script>
    <style>
      /* Theme background variables defined early so components using var(--shadcn-ui-app-background) don't flash white */
      :root[data-shadcn-ui-mode="dark-emerald"] { --shadcn-ui-app-background: #111111; }
      :root[data-shadcn-ui-mode="light"] { --shadcn-ui-app-background: #ffffff; }
      body, #root { background: var(--shadcn-ui-app-background, #111111); min-height: 100vh; }
      /* Prevent toast / notification containers from exceeding viewport width */
      .toaster, .toaster * { max-width: 100%; box-sizing: border-box; }
      /* Respect reduced motion for any future fade transitions */
      @media (prefers-reduced-motion: reduce) { .fade-enter-active, .fade-exit-active { transition: none !important; } }
    </style>
    <title>modDNS</title>
  </head>
  <body style="overflow-x:hidden;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
