definitions:
  api.BlocklistsUpdates:
    properties:
      blocklist_ids:
        items:
          type: string
        maxItems: 100
        minItems: 1
        type: array
    required:
    - blocklist_ids
    type: object
  api.ErrResponse:
    properties:
      details:
        items:
          type: string
        type: array
      error:
        type: string
    type: object
  api.ServicesUpdates:
    properties:
      service_ids:
        items:
          type: string
        maxItems: 100
        minItems: 1
        type: array
    required:
    - service_ids
    type: object
  api.WebAuthnLoginBeginRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  api.WebAuthnRegisterBeginRequest:
    properties:
      email:
        type: string
      subid:
        type: string
    required:
    - email
    - subid
    type: object
  api.createProfileBody:
    properties:
      name:
        maxLength: 50
        minLength: 1
        type: string
    required:
    - name
    type: object
  api.registerAccountBody:
    properties:
      email:
        type: string
      password:
        type: string
      subid:
        type: string
    required:
    - email
    - password
    - subid
    type: object
  api.verifyEmailOTPBody:
    properties:
      otp:
        type: string
    required:
    - otp
    type: object
  fiber.Map:
    additionalProperties: true
    type: object
  model.Account:
    properties:
      auth_methods:
        items:
          type: string
        type: array
      email:
        type: string
      email_verified:
        type: boolean
      error_reports_consent:
        type: boolean
      id:
        type: string
      mfa:
        $ref: '#/definitions/model.MFASettings'
      profiles:
        items:
          type: string
        type: array
      queries:
        type: integer
    type: object
  model.AccountUpdate:
    properties:
      operation:
        enum:
        - remove
        - add
        - replace
        - move
        - copy
        - test
        type: string
      path:
        enum:
        - /password
        - /error_reports_consent
        - /profiles
        - /email
        type: string
      value: {}
    required:
    - operation
    - path
    - value
    type: object
  model.Advanced:
    properties:
      recursor:
        type: string
    required:
    - recursor
    type: object
  model.Blocklist:
    properties:
      blocklist_id:
        type: string
      default:
        description: default blocklist is enabled when profile is created
        type: boolean
      description:
        description: displayed to the user
        type: string
      entries:
        type: integer
      homepage:
        type: string
      id:
        type: string
      last_modified:
        type: string
      name:
        description: conventional blocklist name, displayed to the user
        type: string
      source_url:
        type: string
      tags:
        items:
          type: string
        type: array
      type:
        type: string
    required:
    - blocklist_id
    - description
    - name
    type: object
  model.Credential:
    properties:
      created_at:
        type: string
      id:
        type: string
    type: object
  model.CustomRule:
    properties:
      action:
        type: string
      id:
        type: string
      value:
        type: string
    required:
    - action
    - id
    - value
    type: object
  model.DNSRequest:
    properties:
      dnssec:
        type: boolean
      domain:
        type: string
      query_type:
        type: string
      response_code:
        type: string
    type: object
  model.DNSSECSettings:
    properties:
      enabled:
        type: boolean
      send_do_bit:
        type: boolean
    required:
    - enabled
    - send_do_bit
    type: object
  model.LogsSettings:
    properties:
      enabled:
        type: boolean
      log_clients_ips:
        type: boolean
      log_domains:
        type: boolean
      retention:
        $ref: '#/definitions/model.Retention'
    required:
    - enabled
    - log_clients_ips
    - log_domains
    - retention
    type: object
  model.MFASettings:
    properties:
      totp:
        $ref: '#/definitions/model.TotpSettings'
    type: object
  model.Privacy:
    properties:
      blocklists:
        items:
          type: string
        type: array
      custom_rules_subdomains:
        enum:
        - include
        - exact
        type: string
      default_rule:
        enum:
        - block
        - allow
        type: string
      services:
        $ref: '#/definitions/model.ServicesSettings'
      subdomains_rule:
        enum:
        - block
        - allow
        type: string
    required:
    - default_rule
    - subdomains_rule
    type: object
  model.Profile:
    properties:
      account_id:
        type: string
      id:
        type: string
      name:
        maxLength: 50
        type: string
      profile_id:
        type: string
      settings:
        $ref: '#/definitions/model.ProfileSettings'
    required:
    - account_id
    - id
    - name
    - profile_id
    - settings
    type: object
  model.ProfileSettings:
    properties:
      advanced:
        $ref: '#/definitions/model.Advanced'
      custom_rules:
        items:
          $ref: '#/definitions/model.CustomRule'
        type: array
      logs:
        $ref: '#/definitions/model.LogsSettings'
      privacy:
        $ref: '#/definitions/model.Privacy'
      profile_id:
        type: string
      security:
        $ref: '#/definitions/model.Security'
      statistics:
        $ref: '#/definitions/model.StatisticsSettings'
    required:
    - advanced
    - logs
    - privacy
    - profile_id
    - security
    - statistics
    type: object
  model.ProfileUpdate:
    properties:
      operation:
        enum:
        - remove
        - add
        - replace
        - move
        - copy
        type: string
      path:
        enum:
        - /name
        - /settings/statistics/enabled
        - /settings/logs/enabled
        - /settings/logs/log_clients_ips
        - /settings/logs/log_domains
        - /settings/logs/retention
        - /settings/privacy/default_rule
        - /settings/privacy/subdomains_rule
        - /settings/privacy/custom_rules_subdomains
        - /settings/security/dnssec/enabled
        - /settings/security/dnssec/send_do_bit
        - /settings/advanced/recursor
        type: string
      value: {}
    required:
    - operation
    - path
    - value
    type: object
  model.QueryLog:
    properties:
      client_ip:
        type: string
      device_id:
        type: string
      dns_request:
        $ref: '#/definitions/model.DNSRequest'
      id:
        type: string
      profile_id:
        type: string
      protocol:
        type: string
      reasons:
        items:
          type: string
        type: array
      status:
        type: string
      timestamp:
        type: string
    type: object
  model.Retention:
    enum:
    - 1h
    - 6h
    - 1d
    - 1w
    - 1m
    type: string
    x-enum-varnames:
    - RetentionOneHour
    - RetentionSixHours
    - RetentionOneDay
    - RetentionOneWeek
    - RetentionOneMonth
  model.Security:
    properties:
      dnssec:
        $ref: '#/definitions/model.DNSSECSettings'
    required:
    - dnssec
    type: object
  model.ServicesSettings:
    properties:
      blocked:
        items:
          type: string
        type: array
    type: object
  model.StatisticsAggregated:
    properties:
      total:
        description: 'Note: "total" needs to be the same as in the repository mongo
          query'
        type: integer
    type: object
  model.StatisticsSettings:
    properties:
      enabled:
        type: boolean
    required:
    - enabled
    type: object
  model.Subscription:
    properties:
      active_until:
        type: string
      type:
        $ref: '#/definitions/model.SubscriptionType'
    type: object
  model.SubscriptionType:
    enum:
    - Free
    - Managed
    type: string
    x-enum-varnames:
    - Free
    - Managed
  model.TOTPBackup:
    properties:
      backup_codes:
        items:
          type: string
        type: array
    type: object
  model.TOTPNew:
    properties:
      account:
        type: string
      secret:
        type: string
      uri:
        type: string
    type: object
  model.TotpSettings:
    properties:
      enabled:
        description: Indicates if TOTP is enabled.
        type: boolean
    type: object
  protocol.AttestationFormat:
    enum:
    - packed
    - tpm
    - android-key
    - android-safetynet
    - fido-u2f
    - apple
    - none
    type: string
    x-enum-varnames:
    - AttestationFormatPacked
    - AttestationFormatTPM
    - AttestationFormatAndroidKey
    - AttestationFormatAndroidSafetyNet
    - AttestationFormatFIDOUniversalSecondFactor
    - AttestationFormatApple
    - AttestationFormatNone
  protocol.AuthenticationExtensions:
    additionalProperties: {}
    type: object
  protocol.AuthenticatorAttachment:
    enum:
    - platform
    - cross-platform
    type: string
    x-enum-varnames:
    - Platform
    - CrossPlatform
  protocol.AuthenticatorSelection:
    properties:
      authenticatorAttachment:
        allOf:
        - $ref: '#/definitions/protocol.AuthenticatorAttachment'
        description: |-
          AuthenticatorAttachment If this member is present, eligible authenticators are filtered to only
          authenticators attached with the specified AuthenticatorAttachment enum.
      requireResidentKey:
        description: |-
          RequireResidentKey this member describes the Relying Party's requirements regarding resident
          credentials. If the parameter is set to true, the authenticator MUST create a client-side-resident
          public key credential source when creating a public key credential.
        type: boolean
      residentKey:
        allOf:
        - $ref: '#/definitions/protocol.ResidentKeyRequirement'
        description: |-
          ResidentKey this member describes the Relying Party's requirements regarding resident
          credentials per Webauthn Level 2.
      userVerification:
        allOf:
        - $ref: '#/definitions/protocol.UserVerificationRequirement'
        description: |-
          UserVerification This member describes the Relying Party's requirements regarding user verification for
          the create() operation. Eligible authenticators are filtered to only those capable of satisfying this
          requirement.
    type: object
  protocol.AuthenticatorTransport:
    enum:
    - usb
    - nfc
    - ble
    - smart-card
    - hybrid
    - internal
    type: string
    x-enum-varnames:
    - USB
    - NFC
    - BLE
    - SmartCard
    - Hybrid
    - Internal
  protocol.ConveyancePreference:
    enum:
    - none
    - indirect
    - direct
    - enterprise
    type: string
    x-enum-varnames:
    - PreferNoAttestation
    - PreferIndirectAttestation
    - PreferDirectAttestation
    - PreferEnterpriseAttestation
  protocol.CredentialAssertion:
    properties:
      mediation:
        $ref: '#/definitions/protocol.CredentialMediationRequirement'
      publicKey:
        $ref: '#/definitions/protocol.PublicKeyCredentialRequestOptions'
    type: object
  protocol.CredentialCreation:
    properties:
      mediation:
        $ref: '#/definitions/protocol.CredentialMediationRequirement'
      publicKey:
        $ref: '#/definitions/protocol.PublicKeyCredentialCreationOptions'
    type: object
  protocol.CredentialDescriptor:
    properties:
      id:
        description: CredentialID The ID of a credential to allow/disallow.
        items:
          type: integer
        type: array
      transports:
        description: The authenticator transports that can be used.
        items:
          $ref: '#/definitions/protocol.AuthenticatorTransport'
        type: array
      type:
        allOf:
        - $ref: '#/definitions/protocol.CredentialType'
        description: The valid credential types.
    type: object
  protocol.CredentialMediationRequirement:
    enum:
    - silent
    - optional
    - conditional
    - required
    type: string
    x-enum-varnames:
    - MediationSilent
    - MediationOptional
    - MediationConditional
    - MediationRequired
  protocol.CredentialParameter:
    properties:
      alg:
        $ref: '#/definitions/webauthncose.COSEAlgorithmIdentifier'
      type:
        $ref: '#/definitions/protocol.CredentialType'
    type: object
  protocol.CredentialType:
    enum:
    - public-key
    type: string
    x-enum-varnames:
    - PublicKeyCredentialType
  protocol.PublicKeyCredentialCreationOptions:
    properties:
      attestation:
        $ref: '#/definitions/protocol.ConveyancePreference'
      attestationFormats:
        items:
          $ref: '#/definitions/protocol.AttestationFormat'
        type: array
      authenticatorSelection:
        $ref: '#/definitions/protocol.AuthenticatorSelection'
      challenge:
        items:
          type: integer
        type: array
      excludeCredentials:
        items:
          $ref: '#/definitions/protocol.CredentialDescriptor'
        type: array
      extensions:
        $ref: '#/definitions/protocol.AuthenticationExtensions'
      hints:
        items:
          $ref: '#/definitions/protocol.PublicKeyCredentialHints'
        type: array
      pubKeyCredParams:
        items:
          $ref: '#/definitions/protocol.CredentialParameter'
        type: array
      rp:
        $ref: '#/definitions/protocol.RelyingPartyEntity'
      timeout:
        type: integer
      user:
        $ref: '#/definitions/protocol.UserEntity'
    type: object
  protocol.PublicKeyCredentialHints:
    enum:
    - security-key
    - client-device
    - hybrid
    type: string
    x-enum-varnames:
    - PublicKeyCredentialHintSecurityKey
    - PublicKeyCredentialHintClientDevice
    - PublicKeyCredentialHintHybrid
  protocol.PublicKeyCredentialRequestOptions:
    properties:
      allowCredentials:
        items:
          $ref: '#/definitions/protocol.CredentialDescriptor'
        type: array
      challenge:
        items:
          type: integer
        type: array
      extensions:
        $ref: '#/definitions/protocol.AuthenticationExtensions'
      hints:
        items:
          $ref: '#/definitions/protocol.PublicKeyCredentialHints'
        type: array
      rpId:
        type: string
      timeout:
        type: integer
      userVerification:
        $ref: '#/definitions/protocol.UserVerificationRequirement'
    type: object
  protocol.RelyingPartyEntity:
    properties:
      id:
        description: A unique identifier for the Relying Party entity, which sets
          the RP ID.
        type: string
      name:
        description: |-
          A human-palatable name for the entity. Its function depends on what the PublicKeyCredentialEntity represents:

          When inherited by PublicKeyCredentialRpEntity it is a human-palatable identifier for the Relying Party,
          intended only for display. For example, "ACME Corporation", "Wonderful Widgets, Inc." or "ОАО Примертех".

          When inherited by PublicKeyCredentialUserEntity, it is a human-palatable identifier for a user account. It is
          intended only for display, i.e., aiding the user in determining the difference between user accounts with similar
          displayNames. For example, "alexm", "alex.p.mueller@example.com" or "+14255551234".
        type: string
    type: object
  protocol.ResidentKeyRequirement:
    enum:
    - discouraged
    - preferred
    - required
    type: string
    x-enum-varnames:
    - ResidentKeyRequirementDiscouraged
    - ResidentKeyRequirementPreferred
    - ResidentKeyRequirementRequired
  protocol.UserEntity:
    properties:
      displayName:
        description: |-
          A human-palatable name for the user account, intended only for display.
          For example, "Alex P. Müller" or "田中 倫". The Relying Party SHOULD let
          the user choose this, and SHOULD NOT restrict the choice more than necessary.
        type: string
      id:
        description: |-
          ID is the user handle of the user account entity. To ensure secure operation,
          authentication and authorization decisions MUST be made on the basis of this id
          member, not the displayName nor name members. See Section 6.1 of
          [RFC8266](https://www.w3.org/TR/webauthn/#biblio-rfc8266).
      name:
        description: |-
          A human-palatable name for the entity. Its function depends on what the PublicKeyCredentialEntity represents:

          When inherited by PublicKeyCredentialRpEntity it is a human-palatable identifier for the Relying Party,
          intended only for display. For example, "ACME Corporation", "Wonderful Widgets, Inc." or "ОАО Примертех".

          When inherited by PublicKeyCredentialUserEntity, it is a human-palatable identifier for a user account. It is
          intended only for display, i.e., aiding the user in determining the difference between user accounts with similar
          displayNames. For example, "alexm", "alex.p.mueller@example.com" or "+14255551234".
        type: string
    type: object
  protocol.UserVerificationRequirement:
    enum:
    - required
    - preferred
    - discouraged
    type: string
    x-enum-comments:
      VerificationPreferred: This is the default
    x-enum-descriptions:
    - ""
    - This is the default
    - ""
    x-enum-varnames:
    - VerificationRequired
    - VerificationPreferred
    - VerificationDiscouraged
  requests.AccountDeletionRequest:
    properties:
      current_password:
        minLength: 1
        type: string
      deletion_code:
        type: string
      reauth_token:
        minLength: 1
        type: string
    required:
    - deletion_code
    type: object
  requests.AccountUpdates:
    properties:
      updates:
        items:
          $ref: '#/definitions/model.AccountUpdate'
        type: array
    required:
    - updates
    type: object
  requests.AdvancedOptionsReq:
    properties:
      encryption_type:
        enum:
        - https
        - tls
        type: string
      excluded_wifi_networks:
        description: ExcludedDomains          string `json:"excluded_domains"`
        type: string
    required:
    - encryption_type
    type: object
  requests.ConfirmResetPasswordBody:
    properties:
      new_password:
        type: string
      otp:
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  requests.CreateProfileCustomRuleBody:
    properties:
      action:
        enum:
        - block
        - allow
        - comment
        type: string
      value:
        type: string
    required:
    - action
    - value
    type: object
  requests.CreateProfileCustomRulesBatchBody:
    properties:
      action:
        enum:
        - block
        - allow
        - comment
        type: string
      values:
        items:
          type: string
        maxItems: 20
        minItems: 1
        type: array
    required:
    - action
    - values
    type: object
  requests.LoginBody:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  requests.MobileConfigReq:
    properties:
      advanced_options:
        $ref: '#/definitions/requests.AdvancedOptionsReq'
      device_id:
        description: |-
          DeviceId is an optional human-friendly identifier for the device.
          It will be normalized (allowing only [A-Za-z0-9 -]) and truncated to a max length
          consistent with the DNS proxy rules (currently 16). When provided, generated
          mobileconfig profile endpoints (DoH / DoT / DoQ) will embed it so queries can
          be attributed per-device.
        type: string
      profile_id:
        type: string
    required:
    - profile_id
    type: object
  requests.ProfileUpdates:
    properties:
      updates:
        items:
          $ref: '#/definitions/model.ProfileUpdate'
        type: array
    required:
    - updates
    type: object
  requests.ResetPasswordBody:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  requests.SubscriptionReq:
    properties:
      active_until:
        type: string
      id:
        description: ID is the external Subscription ID (UUIDv4)
        type: string
    required:
    - active_until
    - id
    type: object
  requests.TotpReq:
    properties:
      otp:
        maxLength: 8
        minLength: 6
        type: string
    required:
    - otp
    type: object
  requests.WebAuthnReauthBeginRequest:
    properties:
      purpose:
        enum:
        - email_change
        - account_deletion
        type: string
    required:
    - purpose
    type: object
  responses.CreateProfileCustomRulesBatchResponse:
    properties:
      action:
        type: string
      created:
        items:
          $ref: '#/definitions/responses.CustomRuleBatchCreated'
        type: array
      skipped:
        items:
          $ref: '#/definitions/responses.CustomRuleBatchSkipped'
        type: array
      total_requested:
        type: integer
    type: object
  responses.CustomRuleBatchCreated:
    properties:
      id:
        type: string
      value:
        type: string
    type: object
  responses.CustomRuleBatchSkipped:
    properties:
      message:
        type: string
      reason:
        type: string
      value:
        type: string
    type: object
  responses.DeletionCodeResponse:
    properties:
      code:
        type: string
      expires_at:
        type: string
    type: object
  responses.RegistrationSuccessResponse:
    properties:
      message:
        example: Account created successfully.
        type: string
    type: object
  responses.ShortLinkResponse:
    properties:
      link:
        type: string
    type: object
  responses.WebAuthnReauthFinishResponse:
    properties:
      expires_at:
        type: string
      reauth_token:
        type: string
    type: object
  servicescatalog.Catalog:
    properties:
      services:
        items:
          $ref: '#/definitions/servicescatalog.Service'
        type: array
    type: object
  servicescatalog.Service:
    properties:
      asns:
        items:
          type: integer
        type: array
      id:
        type: string
      logo_key:
        type: string
      name:
        type: string
    type: object
  webauthncose.COSEAlgorithmIdentifier:
    enum:
    - -7
    - -8
    - -35
    - -36
    - -37
    - -38
    - -39
    - -47
    - -257
    - -258
    - -259
    - -65535
    type: integer
    x-enum-varnames:
    - AlgES256
    - AlgEdDSA
    - AlgES384
    - AlgES512
    - AlgPS256
    - AlgPS384
    - AlgPS512
    - AlgES256K
    - AlgRS256
    - AlgRS384
    - AlgRS512
    - AlgRS1
info:
  contact: {}
  description: modDNS REST API
  title: modDNS REST API
  version: "1.0"
paths:
  /api/v1/accounts:
    patch:
      consumes:
      - application/json
      description: Update account
      parameters:
      - description: Update account request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.AccountUpdates'
      - description: MFA OTP code
        in: header
        name: x-mfa-code
        type: string
      - collectionFormat: csv
        description: MFA methods
        in: header
        items:
          type: string
        name: x-mfa-methods
        type: array
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrResponse'
      summary: Update account
      tags:
      - Account
    post:
      consumes:
      - application/json
      description: Register account
      parameters:
      - description: Account request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.registerAccountBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/responses.RegistrationSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrResponse'
      summary: Register account
      tags:
      - Account
  /api/v1/accounts/current:
    delete:
      consumes:
      - application/json
      description: Delete account with deletion code
      parameters:
      - description: Account deletion request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.AccountDeletionRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrResponse'
        "500":
