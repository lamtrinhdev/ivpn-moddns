services:
  reverse-proxy:
    image: nginx:1.27.1
    restart: always
    container_name: reverse-proxy
    ports:
      - 80:80
      # - 443:443 # - taken by proxy currently
    volumes:
      - ./bootstrap/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    networks:
      - dnsnetwork
    depends_on:
      - api
      - frontend
