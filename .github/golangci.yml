version: "2"
linters:
  default: none
  enable:
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - staticcheck
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - govet
          - ineffassign
          - staticcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
  settings:
    staticcheck:
      checks:
        - all        # enable all staticcheck checks
        - -ST1005    # disable capitalization rule for error strings
        - -ST1003    # disable rule for variable names
        - -ST1016    # disable receiver rules
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - _test\.go
