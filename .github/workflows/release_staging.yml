name: Release to staging

on:
  push:
    branches: ["staging"]

env:
  DNS_API_IMAGE: dns/api
  DNS_PROXY_IMAGE: dns/proxy
  DNS_FRONTEND_IMAGE: dns/app
  DNS_CHECK_IMAGE: dns/check

jobs:
  staging_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "22"

      - name: Install plugins
        run: npm install @semantic-release/git @semantic-release/changelog @semantic-release/exec -D

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Semantic version generated by semantic-release
        id: get_semantic_version
        run: echo "version=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Docker tag
        id: echo_docker_tag
        run: echo "$(cat .version)-${GITHUB_SHA}"

      - name: Read version and set the docker tag
        id: get_docker_tag
        run: echo "tag=$(cat .version)-${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build DNS API image
        run: make build_api_image IMAGE=${{ secrets.REGISTRY_NAME }}/${DNS_API_IMAGE}:${{ steps.get_docker_tag.outputs.tag }}

      - name: Build DNS Proxy image
        run: make build_proxy_image IMAGE=${{ secrets.REGISTRY_NAME }}/${DNS_PROXY_IMAGE}:${{ steps.get_docker_tag.outputs.tag }}

      - name: Build Frontend image
        run: make build_frontend_image IMAGE=${{ secrets.REGISTRY_NAME }}/${DNS_FRONTEND_IMAGE}:${{ steps.get_docker_tag.outputs.tag }} ENVIRONMENT=staging

      - name: Build DNS check image
        run: make build_dnscheck_image IMAGE=${{ secrets.REGISTRY_NAME }}/${DNS_CHECK_IMAGE}:${{ steps.get_docker_tag.outputs.tag }}

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | podman login ${{ secrets.REGISTRY_NAME }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Push DNS API image
        run: podman push ${{ secrets.REGISTRY_NAME }}/${DNS_API_IMAGE}:${{ steps.get_docker_tag.outputs.tag }}

      - name: Push DNS Proxy image
        run: podman push ${{ secrets.REGISTRY_NAME }}/${DNS_PROXY_IMAGE}:${{ steps.get_docker_tag.outputs.tag }}

      - name: Push DNS Frontend image
        run: podman push ${{ secrets.REGISTRY_NAME }}/${DNS_FRONTEND_IMAGE}:${{ steps.get_docker_tag.outputs.tag }}

      - name: Push DNS Check image
        run: podman push ${{ secrets.REGISTRY_NAME }}/${DNS_CHECK_IMAGE}:${{ steps.get_docker_tag.outputs.tag }}

      - name: Trigger workflow in dns-deployment repository
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT }}
          repository: ivpn/dns-deployment
          event-type: update-staging-tags-pr
          client-payload: '{"tag": "${{ steps.get_docker_tag.outputs.tag }}"}'
